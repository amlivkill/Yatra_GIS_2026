<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>केदारनाथ यात्रा Live Dashboard 2026 | Rudraprayag</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep:    #080c14;
            --bg-panel:   rgba(12, 18, 32, 0.97);
            --bg-card:    rgba(20, 28, 48, 0.95);
            --accent:     #4facfe;
            --accent2:    #00f2fe;
            --green:      #2ecc71;
            --red:        #ff4757;
            --yellow:     #f1c40f;
            --orange:     #f39c12;
            --border:     rgba(79, 172, 254, 0.18);
            --text:       #e8edf5;
            --muted:      #8b95a8;
            --radius:     12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-rows: 56px 1fr;
            grid-template-columns: 380px 1fr;
        }

        /* ─── HEADER ─── */
        header {
            grid-column: 1 / -1;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            gap: 16px;
        }
        .header-title {
            display: flex; align-items: center; gap: 10px;
        }
        .header-title h1 {
            font-size: 15px; font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-title span { font-size: 11px; color: var(--muted); }
        .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(46, 204, 113, 0.12);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: 20px; padding: 4px 12px;
            font-size: 11px; color: var(--green); font-weight: 600;
        }
        .live-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--green);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.7); }
        }
        .stat-pills { display: flex; gap: 8px; }
        .stat-pill {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; padding: 4px 12px; font-size: 11px;
            display: flex; align-items: center; gap: 5px;
        }
        .stat-pill .val { font-weight: 700; font-size: 14px; }
        #clock { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

        /* ─── LEFT PANEL ─── */
        .left-panel {
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .panel-tabs {
            display: flex; border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1; padding: 12px 8px; font-size: 12px; font-weight: 600;
            background: none; border: none; color: var(--muted); cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.2s;
        }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { display: none; flex: 1; overflow-y: auto; padding: 14px; }
        .tab-content.active { display: block; }

        /* ─── FORM ─── */
        .form-group { margin-bottom: 13px; }
        label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px; font-weight: 500; }
        select, input, textarea {
            width: 100%; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); font-family: 'Inter', sans-serif;
            font-size: 13px; padding: 9px 12px; outline: none;
            transition: border-color 0.2s;
        }
        select:focus, input:focus, textarea:focus { border-color: var(--accent); }
        textarea { resize: vertical; min-height: 64px; }

        .severity-row { display: flex; gap: 6px; }
        .sev-btn {
            flex: 1; padding: 7px 4px; border-radius: 8px; border: 1.5px solid transparent;
            font-size: 11px; font-weight: 600; cursor: pointer;
            background: var(--bg-card); color: var(--muted); transition: all 0.2s;
        }
        .sev-btn[data-sev="normal"]   { border-color: rgba(46,204,113,0.3); }
        .sev-btn[data-sev="moderate"] { border-color: rgba(241,196,15,0.3); }
        .sev-btn[data-sev="critical"] { border-color: rgba(255,71,87,0.3); }
        .sev-btn.selected[data-sev="normal"]   { background: rgba(46,204,113,0.18); color: var(--green); }
        .sev-btn.selected[data-sev="moderate"] { background: rgba(241,196,15,0.18); color: var(--yellow); }
        .sev-btn.selected[data-sev="critical"] { background: rgba(255,71,87,0.18); color: var(--red); }

        .submit-btn {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #080c14; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: opacity 0.2s, transform 0.15s;
            margin-top: 4px;
        }
        .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .submit-btn:active { transform: translateY(0); }

        /* ─── REPORTS LIST ─── */
        .report-item {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; padding: 11px 13px; margin-bottom: 8px;
            cursor: pointer; transition: border-color 0.2s;
            border-left: 3px solid;
        }
        .report-item:hover { border-color: var(--accent); }
        .report-item.normal   { border-left-color: var(--green); }
        .report-item.moderate { border-left-color: var(--yellow); }
        .report-item.critical { border-left-color: var(--red); }
        .report-meta { font-size: 10px; color: var(--muted); margin-top: 4px; display: flex; gap: 8px; }
        .report-sector { font-size: 12px; font-weight: 600; }
        .report-type-badge {
            font-size: 10px; padding: 2px 7px; border-radius: 10px;
            background: rgba(79,172,254,0.12); color: var(--accent); font-weight: 500;
        }
        .sev-tag {
            font-size: 9px; padding: 1px 6px; border-radius: 8px; font-weight: 700;
        }
        .sev-tag.normal   { background: rgba(46,204,113,0.15); color: var(--green); }
        .sev-tag.moderate { background: rgba(241,196,15,0.15); color: var(--yellow); }
        .sev-tag.critical { background: rgba(255,71,87,0.15); color: var(--red); }

        /* ─── STATS TAB ─── */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px; text-align: center;
        }
        .stat-card .big { font-size: 28px; font-weight: 700; }
        .stat-card .lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }
        .sector-bars { }
        .sector-bar-item { margin-bottom: 8px; }
        .bar-label { font-size: 11px; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .bar-track { background: rgba(255,255,255,0.06); border-radius: 4px; height: 6px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s ease; }

        .export-btn {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--accent); font-size: 12px; font-weight: 600;
            cursor: pointer; transition: background 0.2s; margin-top: 10px;
        }
        .export-btn:hover { background: rgba(79,172,254,0.08); }

        /* ─── MAP ─── */
        #map { width: 100%; height: 100%; }

        /* ─── Layer Switcher ─── */
        .layer-switcher {
            position: absolute; bottom: 30px; left: 420px;
            z-index: 1000; display: flex; gap: 6px;
            background: rgba(8,12,20,0.92); border: 1px solid var(--border);
            border-radius: 40px; padding: 5px 8px;
        }
        .layer-btn {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 13px; border-radius: 30px; border: none;
            background: transparent; color: var(--muted);
            font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .layer-btn:hover { color: #fff; background: rgba(79,172,254,0.1); }
        .layer-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #080c14; font-weight: 700;
            box-shadow: 0 0 10px rgba(79,172,254,0.4);
        }

        /* ─── Toast ─── */
        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--green); color: #000; padding: 10px 22px;
            border-radius: 20px; font-size: 13px; font-weight: 600;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
            z-index: 9999;
        }
        #toast.show { opacity: 1; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header>
    <div class="header-title">
        <div>
            <h1>🏔️ केदारनाथ यात्रा Live Monitoring Dashboard 2026</h1>
            <span>जिला प्रशासन रुद्रप्रयाग | CHANGE TechLab</span>
        </div>
    </div>
    <div class="stat-pills">
        <div class="stat-pill">
            <span>कुल रिपोर्ट</span>
            <span class="val" id="h-total" style="color:var(--accent)">0</span>
        </div>
        <div class="stat-pill">
            <span>Critical</span>
            <span class="val" id="h-critical" style="color:var(--red)">0</span>
        </div>
        <div class="stat-pill">
            <span>Normal</span>
            <span class="val" id="h-normal" style="color:var(--green)">0</span>
        </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
        <div class="live-badge"><div class="live-dot"></div> LIVE</div>
        <div id="clock"></div>
    </div>
</header>

<!-- ─── LEFT PANEL ─── -->
<div class="left-panel">
    <div class="panel-tabs">
        <button class="tab-btn active" onclick="switchTab('input')">📝 फील्ड इनपुट</button>
        <button class="tab-btn" onclick="switchTab('reports')">📋 रिपोर्ट्स</button>
        <button class="tab-btn" onclick="switchTab('stats')">📊 Stats</button>
    </div>

    <!-- INPUT TAB -->
    <div class="tab-content active" id="tab-input">
        <div class="form-group">
            <label>📍 सेक्टर चुनें *</label>
            <select id="f-sector">
                <option value="">-- सेक्टर चुनें --</option>
                <option value="0">1 — सिरोबगड से जवाडी वाईपास</option>
                <option value="1">2 — जवाडी वाईपास-रुद्रप्रयाग-तिलवाड़ा</option>
                <option value="2">3 — तिलवाडा से अगस्त्यमुनि</option>
                <option value="3">4 — अगस्त्यमुनि से कुण्ड</option>
                <option value="4">5 — कुण्ड से गुप्तकाशी</option>
                <option value="5">6 — गुप्तकाशी से फाटा</option>
                <option value="6">7 — फाटा से सोनप्रयाग</option>
                <option value="7">8 — सोनप्रयाग</option>
                <option value="8">9 — गौरीकुण्ड</option>
                <option value="9">10 — भीमबली</option>
                <option value="10">11 — बडी लिनचैली</option>
                <option value="11">12 — केदारनाथ घौडा पडाव</option>
                <option value="12">13 — केदारनाथ हैलीपैड</option>
                <option value="13">14 — केदारनाथ मन्दिर</option>
            </select>
        </div>

        <div class="form-group">
            <label>🚨 घटना / रिपोर्ट प्रकार *</label>
            <select id="f-type">
                <option value="">-- प्रकार चुनें --</option>
                <optgroup label="🏥 चिकित्सा">
                    <option>मेडिकल इमरजेंसी</option>
                    <option>एम्बुलेंस कॉल (108)</option>
                    <option>पशु चिकित्सा (खच्चर)</option>
                    <option>ऑक्सीजन सिलेंडर लो</option>
                </optgroup>
                <optgroup label="🧹 सफाई">
                    <option>कूड़ा जमाव</option>
                    <option>शौचालय बंद / खराब</option>
                    <option>पेयजल बाधित</option>
                </optgroup>
                <optgroup label="🚗 यातायात/सुरक्षा">
                    <option>जाम / भीड़ नियंत्रण</option>
                    <option>वाहन दुर्घटना</option>
                    <option>VIP मूवमेंट</option>
                    <option>हैलीपैड ऑपरेशन</option>
                </optgroup>
                <optgroup label="⚡ अन्य">
                    <option>बिजली कटौती</option>
                    <option>खाद्य आपूर्ति कम</option>
                    <option>मौसम अलर्ट</option>
                    <option>अन्य / General Update</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>🔴 स्थिति / Severity *</label>
            <div class="severity-row">
                <button class="sev-btn selected" data-sev="normal"   onclick="setSev(this)">✅ सामान्य</button>
                <button class="sev-btn"          data-sev="moderate" onclick="setSev(this)">⚠️ मध्यम</button>
                <button class="sev-btn"          data-sev="critical" onclick="setSev(this)">🔴 गंभीर</button>
            </div>
        </div>

        <div class="form-group">
            <label>👥 वर्तमान भीड़ अनुमान (संख्या)</label>
            <input id="f-crowd" type="number" min="0" placeholder="जैसे: 5000">
        </div>

        <div class="form-group">
            <label>👤 रिपोर्ट करने वाले का नाम / पद</label>
            <input id="f-officer" type="text" placeholder="जैसे: Inspector R.K. Sharma">
        </div>

        <div class="form-group">
            <label>📝 विवरण / Notes</label>
            <textarea id="f-notes" placeholder="घटना का विवरण यहाँ लिखें..."></textarea>
        </div>

        <button class="submit-btn" onclick="submitReport()">
            ⬆️ रिपोर्ट Submit करें
        </button>
    </div>

    <!-- REPORTS TAB -->
    <div class="tab-content" id="tab-reports">
        <div id="reports-list">
            <p style="color:var(--muted);font-size:12px;text-align:center;margin-top:30px">
                अभी कोई रिपोर्ट नहीं। फील्ड इनपुट टैब से submit करें।
            </p>
        </div>
    </div>

    <!-- STATS TAB -->
    <div class="tab-content" id="tab-stats">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="big" id="s-total" style="color:var(--accent)">0</div>
                <div class="lbl">कुल रिपोर्ट</div>
            </div>
            <div class="stat-card">
                <div class="big" id="s-critical" style="color:var(--red)">0</div>
                <div class="lbl">गंभीर (Critical)</div>
            </div>
            <div class="stat-card">
                <div class="big" id="s-moderate" style="color:var(--yellow)">0</div>
                <div class="lbl">मध्यम</div>
            </div>
            <div class="stat-card">
                <div class="big" id="s-normal" style="color:var(--green)">0</div>
                <div class="lbl">सामान्य</div>
            </div>
        </div>

        <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:600">
            सेक्टर-वार रिपोर्ट
        </div>
        <div class="sector-bars" id="sector-bars"></div>

        <button class="export-btn" onclick="exportCSV()">
            ⬇️ CSV Export करें
        </button>
        <button class="export-btn" onclick="clearAll()" style="color:var(--red);margin-top:6px;border-color:rgba(255,71,87,0.2)">
            🗑️ सभी डेटा Clear करें
        </button>
    </div>
</div>

<!-- ─── MAP ─── -->
<div id="map"></div>

<!-- Layer Switcher -->
<div class="layer-switcher">
    <button class="layer-btn active" id="btn-dark"     onclick="switchLayer('dark')">🌑 Dark</button>
    <button class="layer-btn"        id="btn-standard" onclick="switchLayer('standard')">🗺️ Standard</button>
    <button class="layer-btn"        id="btn-topo"     onclick="switchLayer('topo')">🏔️ Topo</button>
</div>

<!-- Toast -->
<div id="toast">✅ रिपोर्ट सफलतापूर्वक Submit हो गई!</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── SECTOR DATA ──────────────────────────────────────────────
const SECTORS = [
    { id:1,  name:"सिरोबगड से जवाडी वाईपास",         lat:30.2900, lng:79.0600 },
    { id:2,  name:"जवाडी वाईपास-रुद्रप्रयाग-तिलवाड़ा", lat:30.2847, lng:78.9835 },
    { id:3,  name:"तिलवाडा से अगस्त्यमुनि",           lat:30.3456, lng:78.9766 },
    { id:4,  name:"अगस्त्यमुनि से कुण्ड",             lat:30.3907, lng:79.0264 },
    { id:5,  name:"कुण्ड से गुप्तकाशी",               lat:30.4697, lng:79.0419 },
    { id:6,  name:"गुप्तकाशी से फाटा",                lat:30.5229, lng:79.0777 },
    { id:7,  name:"फाटा से सोनप्रयाग",                lat:30.5777, lng:79.0387 },
    { id:8,  name:"सोनप्रयाग",                        lat:30.6325, lng:78.9953 },
    { id:9,  name:"गौरीकुण्ड",                        lat:30.6330, lng:79.0170 },
    { id:10, name:"भीमबली",                           lat:30.6950, lng:79.0380 },
    { id:11, name:"बडी लिनचैली",                      lat:30.7069, lng:79.0658 },
    { id:12, name:"केदारनाथ घौडा पडाव",               lat:30.7280, lng:79.0668 },
    { id:13, name:"केदारनाथ हैलीपैड",                 lat:30.7330, lng:79.0635 },
    { id:14, name:"केदारनाथ मन्दिर",                  lat:30.7352, lng:79.0669 },
];

const SEV_COLOR = { normal:"#2ecc71", moderate:"#f1c40f", critical:"#ff4757" };
const SEV_RADIUS = { normal: 8, moderate: 11, critical: 14 };

// ── MAP INIT ─────────────────────────────────────────────────
const BOUNDS = L.latLngBounds([30.17,78.75],[30.85,79.35]);
const map = L.map('map', {
    center: [30.50, 79.02], zoom: 10,
    minZoom: 9, maxZoom: 17,
    maxBounds: BOUNDS, maxBoundsViscosity: 1.0
});

const tileLayers = {
    dark:     L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
                { attribution:'© OpenStreetMap | © CARTO', bounds: BOUNDS }),
    standard: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                { attribution:'© OpenStreetMap contributors', bounds: BOUNDS }),
    topo:     L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
                { attribution:'© OpenTopoMap | © OpenStreetMap', bounds: BOUNDS, maxZoom:17 })
};
let activeLayer = 'dark';
tileLayers.dark.addTo(map);

function switchLayer(n) {
    if (n === activeLayer) return;
    map.removeLayer(tileLayers[activeLayer]);
    tileLayers[n].addTo(map);
    activeLayer = n;
    document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + n).classList.add('active');
}

// Static sector markers (base points, subtle)
SECTORS.forEach(s => {
    L.circleMarker([s.lat, s.lng], {
        radius: 5, fillColor: "#4facfe", color: "#fff",
        weight: 1.5, fillOpacity: 0.5
    }).addTo(map).bindTooltip(`S${s.id}: ${s.name}`, { direction:'top' });
});

// ── STATE ────────────────────────────────────────────────────
let reports = JSON.parse(localStorage.getItem('yatra_reports') || '[]');
let reportMarkers = {};   // report id → marker
let selectedSev = 'normal';

// ── CLOCK ────────────────────────────────────────────────────
function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
        now.toLocaleTimeString('hi-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit' }) +
        ' | ' + now.toLocaleDateString('hi-IN');
}
setInterval(updateClock, 1000); updateClock();

// ── TABS ─────────────────────────────────────────────────────
function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
        b.classList.toggle('active', ['input','reports','stats'][i] === name);
    });
    document.querySelectorAll('.tab-content').forEach((c,i) => {
        c.classList.toggle('active', ['tab-input','tab-reports','tab-stats'][i] === 'tab-' + name);
    });
    if (name === 'stats') renderStats();
}

// ── SEVERITY ─────────────────────────────────────────────────
function setSev(btn) {
    document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedSev = btn.dataset.sev;
}

// ── SUBMIT ───────────────────────────────────────────────────
function submitReport() {
    const si = document.getElementById('f-sector').value;
    const type = document.getElementById('f-type').value;
    if (si === '' || !type) {
        alert('कृपया सेक्टर और रिपोर्ट प्रकार चुनें।'); return;
    }
    const sector = SECTORS[parseInt(si)];
    const report = {
        id: Date.now(),
        sectorIdx: parseInt(si),
        sectorName: sector.name,
        sectorId: sector.id,
        type,
        severity: selectedSev,
        crowd: document.getElementById('f-crowd').value || '—',
        officer: document.getElementById('f-officer').value || 'अज्ञात',
        notes: document.getElementById('f-notes').value || '',
        lat: sector.lat + (Math.random()-0.5)*0.003,
        lng: sector.lng + (Math.random()-0.5)*0.003,
        time: new Date().toLocaleString('hi-IN')
    };
    reports.unshift(report);
    localStorage.setItem('yatra_reports', JSON.stringify(reports));

    addReportMarker(report);
    renderReportsList();
    updateHeaderStats();
    showToast();
    resetForm();
}

function addReportMarker(r) {
    const color = SEV_COLOR[r.severity];
    const radius = SEV_RADIUS[r.severity];
    const marker = L.circleMarker([r.lat, r.lng], {
        radius, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.95
    }).addTo(map);
    marker.bindPopup(`
        <div style="min-width:200px;font-family:Inter,sans-serif;">
            <div style="font-weight:700;font-size:13px;color:#000">सेक्टर ${r.sectorId}: ${r.sectorName}</div>
            <hr style="margin:6px 0;border-color:#eee">
            <div style="font-size:12px;color:#333"><b>प्रकार:</b> ${r.type}</div>
            <div style="font-size:12px;color:#333"><b>Severity:</b>
                <span style="color:${color};font-weight:700">${r.severity.toUpperCase()}</span>
            </div>
            <div style="font-size:12px;color:#333"><b>भीड़:</b> ${r.crowd}</div>
            <div style="font-size:12px;color:#333"><b>Officer:</b> ${r.officer}</div>
            ${r.notes ? `<div style="font-size:11px;color:#555;margin-top:4px">${r.notes}</div>` : ''}
            <div style="font-size:10px;color:#888;margin-top:6px">🕐 ${r.time}</div>
        </div>
    `);
    reportMarkers[r.id] = marker;

    // Pulse animation for critical
    if (r.severity === 'critical') {
        const pulse = L.circleMarker([r.lat, r.lng], {
            radius: radius + 6, fillColor: color, color: color,
            weight: 2, fillOpacity: 0, opacity: 0.5
        }).addTo(map);
        setTimeout(() => map.removeLayer(pulse), 2000);
    }
}

// ── RENDER REPORTS LIST ───────────────────────────────────────
function renderReportsList() {
    const el = document.getElementById('reports-list');
    if (!reports.length) {
        el.innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;margin-top:30px">कोई रिपोर्ट नहीं।</p>';
        return;
    }
    el.innerHTML = reports.map(r => `
        <div class="report-item ${r.severity}" onclick="flyToReport(${r.id})">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <span class="report-sector">S${r.sectorId}: ${r.sectorName}</span>
                <span class="sev-tag ${r.severity}">${r.severity.toUpperCase()}</span>
            </div>
            <span class="report-type-badge">${r.type}</span>
            <div class="report-meta">
                <span>👤 ${r.officer}</span>
                <span>👥 ${r.crowd}</span>
                <span>🕐 ${r.time}</span>
            </div>
            ${r.notes ? `<div style="font-size:10px;color:var(--muted);margin-top:3px">${r.notes}</div>` : ''}
        </div>
    `).join('');
}

function flyToReport(id) {
    const r = reports.find(x => x.id === id);
    if (!r) return;
    map.flyTo([r.lat, r.lng], 14);
    setTimeout(() => reportMarkers[id]?.openPopup(), 800);
}

// ── STATS ────────────────────────────────────────────────────
function renderStats() {
    const total = reports.length;
    const critical = reports.filter(r => r.severity === 'critical').length;
    const moderate = reports.filter(r => r.severity === 'moderate').length;
    const normal   = reports.filter(r => r.severity === 'normal').length;
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-critical').textContent = critical;
    document.getElementById('s-moderate').textContent = moderate;
    document.getElementById('s-normal').textContent = normal;

    // Sector bars
    const counts = {};
    SECTORS.forEach(s => counts[s.id] = 0);
    reports.forEach(r => counts[r.sectorId] = (counts[r.sectorId] || 0) + 1);
    const max = Math.max(...Object.values(counts), 1);
    const barsEl = document.getElementById('sector-bars');
    barsEl.innerHTML = SECTORS.map(s => `
        <div class="sector-bar-item">
            <div class="bar-label">
                <span>S${s.id}: ${s.name.substring(0,18)}...</span>
                <span>${counts[s.id] || 0}</span>
            </div>
            <div class="bar-track">
                <div class="bar-fill" style="width:${((counts[s.id]||0)/max)*100}%"></div>
            </div>
        </div>
    `).join('');
}

function updateHeaderStats() {
    document.getElementById('h-total').textContent = reports.length;
    document.getElementById('h-critical').textContent = reports.filter(r => r.severity==='critical').length;
    document.getElementById('h-normal').textContent = reports.filter(r => r.severity==='normal').length;
}

// ── EXPORT CSV ───────────────────────────────────────────────
function exportCSV() {
    if (!reports.length) { alert('कोई डेटा नहीं।'); return; }
    const rows = [['ID','Sector','Type','Severity','Crowd','Officer','Notes','Time','Lat','Lng']];
    reports.forEach(r => rows.push([
        r.sectorId, r.sectorName, r.type, r.severity,
        r.crowd, r.officer, r.notes, r.time, r.lat, r.lng
    ]));
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
    a.download = `yatra_reports_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
}

// ── CLEAR ────────────────────────────────────────────────────
function clearAll() {
    if (!confirm('सभी रिपोर्ट्स delete होंगी। क्या आप निश्चित हैं?')) return;
    Object.values(reportMarkers).forEach(m => map.removeLayer(m));
    reportMarkers = {};
    reports = [];
    localStorage.removeItem('yatra_reports');
    renderReportsList();
    updateHeaderStats();
    renderStats();
}

// ── RESET FORM ───────────────────────────────────────────────
function resetForm() {
    document.getElementById('f-sector').value = '';
    document.getElementById('f-type').value = '';
    document.getElementById('f-crowd').value = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('f-officer').value = '';
    document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector('.sev-btn[data-sev="normal"]').classList.add('selected');
    selectedSev = 'normal';
}

// ── TOAST ────────────────────────────────────────────────────
function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT: Load saved reports ──────────────────────────────────
reports.forEach(r => addReportMarker(r));
renderReportsList();
updateHeaderStats();
</script>
</body>
</html>
